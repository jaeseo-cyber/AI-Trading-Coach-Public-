# AI Trading Coach — Gemini API (공개 배포용)
# 사용: cp .env.example .env → GEMINI_API_KEY 설정 → docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trading-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_ADDRESS: ${STREAMLIT_SERVER_ADDRESS:-0.0.0.0}
      STREAMLIT_SERVER_PORT: ${STREAMLIT_SERVER_PORT:-8501}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    ports:
      - "${STREAMLIT_HOST_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    profiles: ["production"]
    image: nginx:1.27-alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      app:
        condition: service_healthy
